spring:
  application:
    name: traffic_pred

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.MySQLDialect

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      ssl:
        enabled: true
server:
  port: ${PORT:8080}

fastapi:
  api-key: ${FAST_API_KEY}
  predict-url: ${PREDICT_URL}
  login-url: ${LOGIN_URL}
